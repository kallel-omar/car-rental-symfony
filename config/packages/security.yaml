security:

    # PASSWORD HASHERS
    password_hashers:

        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'


    # ROLE HIERARCHY
    role_hierarchy:

        ROLE_SUPERVISER: ROLE_ADMIN
        ROLE_ADMIN: ROLE_USER


    # USER PROVIDER
    providers:

        app_user_provider:

            entity:

                class: App\Entity\User
                property: email


    # FIREWALLS
    firewalls:

        dev:

            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:

            lazy: true

            provider: app_user_provider

            custom_authenticator: App\Security\AppAuthenticator

            entry_point: App\Security\AppAuthenticator

            user_checker: App\Security\UserChecker

            logout:

                path: app_logout

            remember_me:

                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true


    # ACCESS CONTROL
    access_control:

        # ONLY SUPERVISER CAN ACCESS USERS MANAGEMENT
        - { path: ^/admin/users, roles: ROLE_SUPERVISER }

        # ADMIN PANEL ACCESS
        - { path: ^/admin, roles: ROLE_ADMIN }


when@test:

    security:

        password_hashers:

            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:

                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
